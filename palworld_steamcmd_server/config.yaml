name: Palworld Dedicated Server (SteamCMD)
slug: palworld_steamcmd_server
description: Palworld Dedicated Server with optional Tailscale networking and Discord webhooks
version: "1.5.2"

url: https://github.com/dez011/Home-Assistant-Gameservers-ADDONS-scaletail/tree/main/palworld_steamcmd_server

arch:
  - amd64

startup: application
boot: auto
init: false
host_network: false

# Tailscale needs /dev/net/tun and NET_ADMIN
privileged:
  - NET_ADMIN
  - SYS_MODULE

ports:
  8211/udp: 8211
  27015/udp: 27015
  25575/tcp: 25575

ports_description:
  8211/udp: "Game Port (UDP)"
  27015/udp: "Query Port (UDP)"
  25575/tcp: "RCON Port (TCP)"

# 🔴 NUR share – Steam + Server + Config liegen auf dem Host
map:
  - share:rw

options:
  # ── SteamCMD ──
  app_id: 2394010
  steam_user: anonymous
  steam_pass: ""
  update_on_boot: true

  # ── Server Settings ──
  server_name: "pal-world-server-docker by Thijs van Loef"
  server_description: "palworld-server-docker by Thijs van Loef"
  server_password: ""
  admin_password: "admin"
  server_player_max_num: 16
  port: 8211
  query_port: 27015
  multithreading: true
  community_server: false
  crossplay_platforms: "Steam,Xbox,PS5,Mac"

  # ── RCON ──
  rcon_enabled: true
  rcon_port: 25575

  # ── Gameplay Rates ──
  daytime_speedrate: 0.9
  nighttime_speedrate: 1.25
  exp_rate: 3.0
  pal_capture_rate: 1.2
  pal_spawn_num_rate: 1.3
  difficulty: "Hard"

  # ── Player Settings ──
  player_damage_rate_attack: 1.0
  player_damage_rate_defense: 0.8
  player_stomach_decrease_rate: 0.4
  player_stamina_decrease_rate: 0.4
  player_auto_hp_regen_rate: 1.0
  player_auto_hp_regen_rate_in_sleep: 1.0

  # ── Pal Settings ──
  pal_damage_rate_attack: 1.0
  pal_damage_rate_defense: 1.0
  pal_stomach_decrease_rate: 0.4
  pal_stamina_decrease_rate: 0.25
  pal_auto_hp_regen_rate: 1.0
  pal_auto_hp_regen_rate_in_sleep: 1.0

  # ── Base / Building ──
  build_object_damage_rate: 1.0
  build_object_deterioration_damage_rate: 0.5
  base_camp_max_num: 128
  base_camp_worker_max_num: 30
  base_camp_max_num_in_guild: 6

  # ── Items / Collection ──
  collection_drop_rate: 2.5
  collection_object_hp_rate: 0.5
  collection_object_respawn_speed_rate: 1.0
  enemy_drop_item_rate: 3.0
  item_weight_rate: 0.25

  # ── Hatching / Work ──
  pal_egg_default_hatching_time: 0.2
  work_speed_rate: 2.0

  # ── Death / Combat ──
  death_penalty: "None"
  enable_friendly_fire: false
  enable_invader_enemy: true
  enable_defense_other_guild_player: false
  enable_player_to_player_damage: false

  # ── Multiplayer ──
  is_multiplay: false
  is_pvp: false
  coop_player_max_num: 4
  exist_player_after_logout: false
  supply_drop_span: 80

  # ── Misc ──
  enable_fast_travel: true
  auto_save_span: 30.0
  is_use_backup_save_data: true
  log_format_type: "Text"

  # ── Discord Webhooks ──
  discord_webhook_url: ""
  discord_pre_update_boot_message: "Server is updating..."
  discord_post_update_boot_message: "Server is back online."
  discord_pre_shutdown_message: "Server is shutting down..."
  discord_player_join_message: "🟢 `player_name` joined"
  discord_player_leave_message: "🔴 `player_name` left"
  discord_player_join_enabled: true
  discord_player_leave_enabled: true
  discord_suppress_notifications: true

  # ── Tailscale ──
  tailscale_enabled: false
  tailscale_authkey: ""
  tailscale_hostname: "palworld"
  tailscale_accept_dns: false
  tailscale_advertise_exit_node: false
  tailscale_serve_enabled: false
  tailscale_serve_port: 8212
  tailscale_funnel: false

schema:
  # ── SteamCMD ──
  app_id: int
  steam_user: str
  steam_pass: str?
  update_on_boot: bool

  # ── Server Settings ──
  server_name: str
  server_description: str?
  server_password: str?
  admin_password: str?
  server_player_max_num: int
  port: int
  query_port: int
  multithreading: bool
  community_server: bool
  crossplay_platforms: str?

  # ── RCON ──
  rcon_enabled: bool
  rcon_port: int

  # ── Gameplay Rates ──
  daytime_speedrate: float
  nighttime_speedrate: float
  exp_rate: float
  pal_capture_rate: float
  pal_spawn_num_rate: float
  difficulty: str

  # ── Player Settings ──
  player_damage_rate_attack: float
  player_damage_rate_defense: float
  player_stomach_decrease_rate: float
  player_stamina_decrease_rate: float
  player_auto_hp_regen_rate: float
  player_auto_hp_regen_rate_in_sleep: float

  # ── Pal Settings ──
  pal_damage_rate_attack: float
  pal_damage_rate_defense: float
  pal_stomach_decrease_rate: float
  pal_stamina_decrease_rate: float
  pal_auto_hp_regen_rate: float
  pal_auto_hp_regen_rate_in_sleep: float

  # ── Base / Building ──
  build_object_damage_rate: float
  build_object_deterioration_damage_rate: float
  base_camp_max_num: int
  base_camp_worker_max_num: int
  base_camp_max_num_in_guild: int

  # ── Items / Collection ──
  collection_drop_rate: float
  collection_object_hp_rate: float
  collection_object_respawn_speed_rate: float
  enemy_drop_item_rate: float
  item_weight_rate: float

  # ── Hatching / Work ──
  pal_egg_default_hatching_time: float
  work_speed_rate: float

  # ── Death / Combat ──
  death_penalty: str
  enable_friendly_fire: bool
  enable_invader_enemy: bool
  enable_defense_other_guild_player: bool
  enable_player_to_player_damage: bool

  # ── Multiplayer ──
  is_multiplay: bool
  is_pvp: bool
  coop_player_max_num: int
  exist_player_after_logout: bool
  supply_drop_span: int

  # ── Misc ──
  enable_fast_travel: bool
  auto_save_span: float
  is_use_backup_save_data: bool
  log_format_type: str

  # ── Discord Webhooks ──
  discord_webhook_url: str?
  discord_pre_update_boot_message: str?
  discord_post_update_boot_message: str?
  discord_pre_shutdown_message: str?
  discord_player_join_message: str?
  discord_player_leave_message: str?
  discord_player_join_enabled: bool
  discord_player_leave_enabled: bool
  discord_suppress_notifications: bool

  # ── Tailscale ──
  tailscale_enabled: bool
  tailscale_authkey: str?
  tailscale_hostname: str
  tailscale_accept_dns: bool
  tailscale_advertise_exit_node: bool
  tailscale_serve_enabled: bool
  tailscale_serve_port: int
  tailscale_funnel: bool
